<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenEnv Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-accent: #38bdf8;
            --neon-glow: rgba(56, 189, 248, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .ambient-light {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, var(--neon-glow) 0%, transparent 70%);
            top: -20vw;
            left: -20vw;
            border-radius: 50%;
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
            animation: pulse 10s infinite alternate;
        }
        
        .ambient-light.right {
            top: unset; bottom: -20vw; left: unset; right: -20vw;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.4) 0%, transparent 70%);
            animation-delay: 5s;
        }

        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.2); } }

        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            width: 100%;
            height: 100vh;
            padding: 1.5rem;
            gap: 1.5rem;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1.2rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            background: linear-gradient(to right, var(--neon-accent), #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .task-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 1rem;
            border-radius: 0.8rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .task-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: var(--neon-accent);
            box-shadow: 0 0 15px var(--neon-glow);
        }

        .task-btn.active {
            background: rgba(56, 189, 248, 0.2);
            border-color: var(--neon-accent);
            box-shadow: 0 0 20px var(--neon-glow);
        }

        /* Main Workspace */
        .workspace {
            flex-grow: 1;
            display: grid;
            grid-template-rows: 1fr;
            grid-template-columns: 3fr 2fr;
            gap: 1.5rem;
            overflow: hidden;
        }

        .panel-header {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--neon-accent);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ticket-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 0.8rem;
            padding: 1.2rem;
            margin-bottom: 1rem;
        }

        .ticket-card p {
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }
        .ticket-card p strong { color: var(--text-main); }

        .chat-history {
            flex-grow: 1;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 0.8rem;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .chat-history::-webkit-scrollbar { width: 6px; }
        .chat-history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        .msg-bubble {
            padding: 0.8rem 1rem;
            border-radius: 0.8rem;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .msg-system {
            background: rgba(168, 85, 247, 0.2);
            border-left: 3px solid #a855f7;
            align-self: flex-start;
        }

        .msg-agent {
            background: rgba(56, 189, 248, 0.2);
            border-right: 3px solid var(--neon-accent);
            align-self: flex-end;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        /* Action Panel */
        .actions-col {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }

        .action-group {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 0.8rem;
            padding: 1rem;
        }

        .action-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.6rem;
            border-radius: 0.4rem;
            margin-bottom: 0.8rem;
            font-family: inherit;
        }
        
        input:focus { outline: none; border-color: var(--neon-accent); }

        .btn-action {
            width: 100%;
            background: linear-gradient(135deg, var(--neon-accent), #2563eb);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 0.4rem;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-action:hover { opacity: 0.9; }
        
        .status-bar {
            display: flex;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--glass-border);
            margin-top: auto;
        }
        .stat-pill {
            background: rgba(255,255,255,0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .reward-positive { color: #4ade80; }
        
        /* Preloader */
        .loader {
            display: none;
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10;
            align-items: center; justify-content: center;
            border-radius: 1.2rem;
        }
        .loader::after {
            content: "";
            width: 40px; height: 40px;
            border: 4px solid transparent;
            border-top-color: var(--neon-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="ambient-light"></div>
    <div class="ambient-light right"></div>

    <div class="app-container">
        
        <!-- Sidebar -->
        <div class="glass-panel sidebar">
            <div class="logo">Env.ai Support</div>
            <div class="panel-header" style="font-size:0.8rem;">Select Scenario</div>
            <div class="task-list">
                <button class="task-btn" onclick="resetEnv('easy', this)">1. Easy (English)</button>
                <button class="task-btn" onclick="resetEnv('medium', this)">2. Medium (DB Query)</button>
                <button class="task-btn" onclick="resetEnv('hard', this)">3. Hard (Japanese KB)</button>
            </div>
            
            <div style="margin-top: auto; font-size: 0.8rem; color: var(--text-muted); line-height:1.5;">
                <strong>Instructions:</strong> Use the action panel to simulate AI steps. Score is calculated deterministically.
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="workspace">
            
            <!-- Context & History -->
            <div class="glass-panel" style="position:relative;">
                <div class="loader" id="loader"></div>
                <div class="panel-header">Observation Space</div>
                
                <div class="ticket-card" id="ticket-info">
                    <p>Load a scenario to view ticket details.</p>
                </div>
                
                <div class="chat-history" id="chat-history">
                    <!-- Messages will appear here -->
                    <div style="color:var(--text-muted); text-align:center; margin-top:2rem;">Environment awaiting initialization...</div>
                </div>
                
                <div class="status-bar" id="status-bar">
                    <div class="stat-pill">Tags: <span id="sys-tags">None</span></div>
                    <div class="stat-pill">Category: <span id="sys-cat">None</span></div>
                    <div class="stat-pill">Step: <span id="sys-step">0</span>/8</div>
                    <div class="stat-pill">Reward: <span id="sys-reward" class="reward-positive">0.0</span></div>
                </div>
            </div>

            <!-- Agent Controls -->
            <div class="glass-panel actions-col">
                <div class="panel-header">Execute Action</div>
                
                <div class="action-group">
                    <label>Query Database</label>
                    <input type="text" id="inp-query" placeholder="e.g. user alice or order GPU">
                    <button class="btn-action" onclick="makeAction('query_database', {query: document.getElementById('inp-query').value})">Execute</button>
                </div>
                
                <div class="action-group">
                    <label>Search Knowledge Base</label>
                    <input type="text" id="inp-topic" placeholder="e.g. API 500 error">
                    <button class="btn-action" onclick="makeAction('search_knowledge_base', {topic: document.getElementById('inp-topic').value})">Search</button>
                </div>

                <div class="action-group">
                    <label>Categorize Ticket</label>
                    <div style="display:flex; gap:0.5rem; margin-bottom:0.8rem;">
                        <input type="text" id="inp-cat" placeholder="Category (e.g. account)">
                        <input type="text" id="inp-tag" placeholder="Tag">
                    </div>
                    <button class="btn-action" onclick="makeAction('categorize_ticket', {category: document.getElementById('inp-cat').value, tags: [document.getElementById('inp-tag').value]})">Categorize</button>
                </div>

                <div class="action-group">
                    <label>Reply to User</label>
                    <input type="text" id="inp-lang" placeholder="Language (en, ja)" value="en" style="width:30%">
                    <input type="text" id="inp-msg" placeholder="Message content">
                    <button class="btn-action" onclick="makeAction('reply_to_user', {language: document.getElementById('inp-lang').value, message: document.getElementById('inp-msg').value})">Send Reply</button>
                </div>
                
                <div class="action-group">
                    <label>Escalate to Engineering</label>
                    <input type="text" id="inp-notes" placeholder="Kaizen Notes">
                    <button class="btn-action" style="background: linear-gradient(135deg, #ef4444, #b91c1c);" onclick="makeAction('escalate_ticket', {engineering_notes: document.getElementById('inp-notes').value})">Escalate</button>
                </div>

                <button class="btn-action" style="background:transparent; border:1px solid #4ade80; color:#4ade80; margin-top:auto;" onclick="makeAction('end_turn', {})">End Turn / Done</button>
            </div>

        </div>
    </div>

    <script>
        const API_URL = ''; // Relative path since it's served by the same backend

        async function resetEnv(taskName, btnElement) {
            showLoader();
            try {
                const res = await fetch(`${API_URL}/reset?task_name=${taskName}`, { method: 'POST' });
                const data = await res.json();
                await fetchState();
                
                // Update UI active buttons
                document.querySelectorAll('.task-btn').forEach(btn => btn.classList.remove('active'));
                if (btnElement) {
                    btnElement.classList.add('active');
                }
            } catch(e) {
                alert("Error resetting environment: " + e);
            }
            hideLoader();
        }

        async function makeAction(type, customData) {
            showLoader();
            try {
                const payload = { action_type: type, ...customData };
                const res = await fetch(`${API_URL}/step`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if(res.status !== 200) {
                    alert("Error: " + JSON.stringify(result));
                }
                await fetchState();
            } catch(e) {
                alert("Action failed: " + e);
            }
            hideLoader();
        }

        async function fetchState() {
            try {
                const res = await fetch(`${API_URL}/state`);
                const stateObj = await res.json();
                
                if (stateObj && stateObj.observation) {
                    renderState(stateObj);
                }
            } catch(e) {
                console.error("Failed to fetch state:", e);
            }
        }

        function renderState(state) {
            const obs = state.observation;
            const ticket = obs.current_ticket || {};
            
            // Render Ticket
            document.getElementById('ticket-info').innerHTML = `
                <p><strong>Ticket ID:</strong> ${ticket.ticket_id || 'N/A'} &nbsp;|&nbsp; <strong>Pri:</strong> ${ticket.priority || 'N/A'}</p>
                <p style="font-size:1.1rem; color:var(--text-main); margin-top:0.8rem; font-style:italic;">"${ticket.message || ''}"</p>
            `;

            // Render History
            const chatBox = document.getElementById('chat-history');
            chatBox.innerHTML = '';
            
            obs.ticket_history.forEach(msg => {
                const div = document.createElement('div');
                div.className = `msg-bubble ${msg.role === 'agent' ? 'msg-agent' : 'msg-system'}`;
                
                if(msg.role === 'agent') {
                    let actData = { action_type: 'unknown' };
                    try {
                        if (msg.content) actData = JSON.parse(msg.content);
                    } catch(err) {
                        console.warn("Could not parse agent action:", msg.content);
                    }
                    div.innerHTML = `[AGENT] > ${actData.action_type || 'action'}<br/><span style="opacity:0.7">Extracted arguments...</span>`;
                } else {
                    div.innerHTML = `<strong>System:</strong> ${msg.content || 'No content provided'}`;
                }
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;

            // Render Status
            document.getElementById('sys-tags').innerText = (obs.system_tags && obs.system_tags.length) ? obs.system_tags.join(', ') : 'None';
            document.getElementById('sys-cat').innerText = obs.system_category || 'None';
            document.getElementById('sys-step').innerText = state.step_count || 0;
            document.getElementById('sys-reward').innerText = (state.reward || 0.0).toFixed(2);
            
            if(state.done) {
                const endDiv = document.createElement('div');
                endDiv.className = `msg-bubble msg-system`;
                endDiv.style.borderLeftColor = '#4ade80';
                endDiv.innerHTML = `<strong>[EPISODE DONE]</strong> Final Score: ${state.reward}`;
                chatBox.appendChild(endDiv);
            }
        }

        function showLoader() { document.getElementById('loader').style.display = 'flex'; }
        function hideLoader() { document.getElementById('loader').style.display = 'none'; }
        
        // Initial fetch
        fetchState();
    </script>
</body>
</html>
